<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Weekly Cartoons</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      padding-bottom: 20px;
    }

    #header {
      position: sticky;
      top: 0;
      background: var(--tg-theme-bg-color, #ffffff);
      border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    #header h1 {
      font-size: 17px;
      font-weight: 600;
    }

    #header .count {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      margin-left: auto;
    }

    #gallery {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .card {
      border-bottom: 1px solid var(--tg-theme-hint-color, #e5e5e5);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: var(--tg-theme-secondary-bg-color, #f4f4f4);
    }

    .card img.loaded {
      aspect-ratio: unset;
    }

    .card .meta {
      padding: 10px 16px 14px;
    }

    .card .week {
      font-weight: 600;
      font-size: 13px;
      color: var(--tg-theme-link-color, #3390ec);
      margin-bottom: 4px;
    }

    .card .prompt {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      line-height: 1.4;
    }

    #state {
      text-align: center;
      padding: 48px 24px;
      color: var(--tg-theme-hint-color, #888);
      font-size: 15px;
    }

    #state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🖼️ Weekly Cartoons</h1>
    <span class="count" id="count"></span>
  </div>
  <div id="gallery"></div>
  <div id="state"><div class="icon">⏳</div>Loading...</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const chatId = new URLSearchParams(location.search).get('chat_id');
    const gallery = document.getElementById('gallery');
    const state = document.getElementById('state');
    const countEl = document.getElementById('count');

    if (!chatId) {
      state.innerHTML = '<div class="icon">⚠️</div>No chat ID provided.';
    } else {
      fetch(`/api/images/${chatId}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(images => {
          state.style.display = 'none';

          if (!images.length) {
            state.style.display = '';
            state.innerHTML = '<div class="icon">🎨</div>No cartoons yet!<br>They appear after each weekly report.';
            return;
          }

          countEl.textContent = `${images.length} week${images.length !== 1 ? 's' : ''}`;

          images.forEach(img => {
            const card = document.createElement('div');
            card.className = 'card';

            const image = document.createElement('img');
            if (img.url) {
              image.src = img.url;
              image.alt = img.prompt || `Week of ${img.week_of}`;
              image.loading = 'lazy';
              image.addEventListener('load', () => image.classList.add('loaded'));
              image.addEventListener('error', () => {
                image.style.display = 'none';
              });
            } else {
              image.style.display = 'none';
            }

            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.innerHTML = `
              <div class="week">Week of ${img.week_of}</div>
              ${img.prompt ? `<div class="prompt">${escHtml(img.prompt)}</div>` : ''}
            `;

            card.appendChild(image);
            card.appendChild(meta);
            gallery.appendChild(card);
          });
        })
        .catch(err => {
          state.innerHTML = `<div class="icon">⚠️</div>Failed to load.<br><small>${escHtml(err.message)}</small>`;
        });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
